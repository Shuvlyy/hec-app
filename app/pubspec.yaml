name: "milo"
description: "Milo - Medical adherence tracking app prototype"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  native_glass_navbar: ^1.0.2
  go_router: ^17.2.3
  flutter_riverpod: ^2.5.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  gap: ^3.0.1
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  riverpod_annotation: ^2.3.5
  uuid: ^4.3.3
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  custom_lint: any
  riverpod_lint: any

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
